name: Build Aether Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Setup Gradle ───────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── 4. Grant execute permission ──────────────────────────────────────────
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # ── 5. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Setup keystore ────────────────────────────────────────────────────
      - name: Setup signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > aether.jks
          printf '%s\n' \
            "STORE_FILE=aether.jks" \
            "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" \
            "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" \
            "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" \
            > local.properties

      # ── 7. Build Release APK ─────────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all

      # ── 8. Upload artifact ───────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-cloud-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/aether-cloud-v*-release.apk
          if-no-files-found: error

      # ── 9. Kirim APK ke Telegram ─────────────────────────────────────────────
      - name: Send APK to Telegram
        if: success()
        run: |
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")

          VERSION=$(grep -m1 'versionName' app/build.gradle.kts 2>/dev/null \
                    | sed 's/.*= *"//' | sed 's/".*//')
          [ -z "$VERSION" ] && VERSION="unknown"

          SIZE_BYTES=$(stat -c%s "$APK_PATH")
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", ${SIZE_BYTES}/1048576}")

          CAPTION=$(printf \
            '✅ Build <b>Aether Cloud</b> berhasil\n\n📦 <b>File:</b> <code>%s</code>\n🏷 <b>Versi:</b> <code>%s</code>\n💾 <b>Ukuran:</b> <code>%s MB</code>\n🔖 <b>Commit:</b> <code>%s</code> — <a href="%s">lihat detail</a>' \
            "$APK_NAME" "$VERSION" "$SIZE_MB" "$SHA_SHORT" "$RUN_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F parse_mode="HTML" \
            -F caption="${CAPTION}" \
            -F document=@"${APK_PATH}" || true

      # ── 10. Notif Telegram (gagal) ───────────────────────────────────────────
      - name: Telegram Notification (Failure)
        if: failure()
        run: |
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TEXT=$(printf \
            '❌ Build <b>Aether Cloud</b> gagal\n\n🔖 <b>Commit:</b> <code>%s</code> — <a href="%s">lihat detail</a>' \
            "$SHA_SHORT" "$RUN_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d "text=${TEXT}" || true
